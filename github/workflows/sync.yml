name: Sync to Hugging Face Hub

on:
  push:
    branches: [ main ] # Change to 'master' if your default branch is master

  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push https://YashuDaKJ:$HF_TOKEN@huggingface.co/spaces/YashuDaKJ/FlamingDeath.Eternal main --force
        
